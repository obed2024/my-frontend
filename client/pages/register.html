<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Clever Store</title>
  <link rel="stylesheet" href="../css/style.css"/>
  
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #ede9fe 0%, #e0e7ff 50%, #dbeafe 100%);
    }

    .auth-box {
      background: #fff;
      border-radius: var(--radius-xl);
      padding: 44px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow-xl);
      border: 2px solid var(--primary-light);
    }

    .auth-logo {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.8px;
      color: var(--gray-900);
    }

    .auth-logo span { color: var(--primary); }

    .auth-subtitle {
      color: var(--gray-500);
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    .form-error {
      background: var(--danger-light);
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
      line-height: 1.5;
      font-weight: 500;
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--gray-500);
    }

    .auth-footer a { color: var(--primary); font-weight: 700; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="auth-wrap">
    <div class="auth-box">

      <div class="auth-logo">Clever <span>Store</span></div>
      <p class="auth-subtitle">Create your account to get started</p>

      <div class="form-error" id="reg-error"></div>

      <form id="registerForm" onsubmit="register(event); return false;">
        <div class="form-group" style="margin-bottom:16px;">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="e.g. John Felix" required>
        </div>

        <div class="form-group" style="margin-bottom:16px;">
          <label>Email</label>
          <input type="email" id="email" placeholder="jane@example.com" required>
        </div>

        <div class="form-group" style="margin-bottom:16px;">
          <label>Phone Number</label>
          <input type="tel" id="phoneNumber" placeholder="+250 78 123 4567" required>
        </div>

        <div class="form-group" style="margin-bottom:16px;">
          <label>Location</label>
          <input type="text" id="location" placeholder="e.g. Kigali" required>
        </div>

        <div class="form-group" style="margin-bottom:16px;">
          <label>Gender</label>
          <select id="gender" required>
            <option value="">Select gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom:16px;">
          <label>Role</label>
          <select id="role" required>
            <option value="">Select role</option>
            <option value="user">Customer</option>
            <option value="seller">Seller</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom:24px;">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min 4 characters" required>
        </div>

        <button type="submit" class="btn btn-blue" id="btn-register" style="width:100%;justify-content:center;padding:14px 22px;font-size:1rem;">
          Create Account
        </button>
      </form>

      <div class="divider">or</div>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </div>

    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    requireGuest();
  </script>
</body>
</html>
