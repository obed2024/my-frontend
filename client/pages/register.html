<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Products App</title>
  <link rel="stylesheet" href="../css/style.css"/>
  
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #f0f4f8;
    }

    .auth-box {
      background: #fff;
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
    }

    .auth-logo {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .auth-logo span { color: #48bb78; }

    .auth-subtitle {
      color: #718096;
      font-size: 0.875rem;
      margin-bottom: 28px;
    }

    .form-error {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      color: #c53030;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: none;
      line-height: 1.5;
    }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #718096;
    }

    .auth-footer a { color: #4299e1; font-weight: 700; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    .divider {
      text-align: center;
      color: #a0aec0;
      font-size: 0.75rem;
      margin: 16px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #e2e8f0;
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }
  </style>
</head>
<body>

  <div class="auth-wrap">
    <div class="auth-box">

      <div class="auth-logo">Shop<span>API</span></div>
      <p class="auth-subtitle">Create your account to get started</p>

      <div class="form-error" id="reg-error"></div>

      <div class="form-group" style="margin-bottom:14px;">
        <label>Full Name *</label>
        <input type="text" id="reg-name" placeholder="e.g. John Felix"/>
      </div>

      <div class="form-group" style="margin-bottom:14px;">
        <label>Email *</label>
        <input type="email" id="reg-email" placeholder="jane@example.com"/>
      </div>

      <div class="form-group" style="margin-bottom:14px;">
        <label>Phone Number *</label>
        <input type="tel" id="reg-phone" placeholder="+1234567890"/>
      </div>

      <div class="form-group" style="margin-bottom:14px;">
        <label>Location *</label>
        <input type="text" id="reg-location" placeholder="e.g. Kigali"/>
      </div>

      <div class="form-group" style="margin-bottom:14px;">
        <label>Gender *</label>
        <select id="reg-gender">
          <option value="">Select gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group" style="margin-bottom:14px;">
        <label>Age *</label>
        <input type="number" id="reg-age" placeholder="e.g. 25" min="1"/>
      </div>

      <div class="form-group" style="margin-bottom:14px;">
        <label>Date of Birth *</label>
        <input type="date" id="reg-dob"/>
      </div>

      <div class="form-group" style="margin-bottom:14px;">
        <label>Account Type *</label>
        <select id="reg-type">
          <option value="customer">Customer</option>
          <option value="seller">Seller</option>
        </select>
      </div>

      <div class="form-group" style="margin-bottom:22px;">
        <label>Password *</label>
        <input type="password" id="reg-password" placeholder="Min 4 characters"
          onkeydown="if(event.key==='Enter') register()"/>
      </div>

      <button class="btn btn-blue" id="btn-register" onclick="register()" style="width:100%;justify-content:center;">
        Create Account
      </button>

      <div class="divider">or</div>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </div>

    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    requireGuest();
  </script>
</body>
</html>
