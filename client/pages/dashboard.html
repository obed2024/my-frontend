<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — ShopAPI</title>
  <link rel="stylesheet" href="../css/style.css"/>
  
  <style>
    .users-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    .users-table th {
      text-align: left;
      padding: 10px 14px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #718096;
      border-bottom: 2px solid #e2e8f0;
    }

    .users-table td {
      padding: 12px 14px;
      border-bottom: 1px solid #f0f4f8;
      color: #2d3748;
      vertical-align: middle;
    }

    .users-table tr:last-child td { border-bottom: none; }
    .users-table tr:hover td { background: #f7fafc; }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: capitalize;
    }

    .badge-customer { background: #ebf8ff; color: #2b6cb0; }
    .badge-seller   { background: #f0fff4; color: #276749; }
    .badge-admin    { background: #fff5f5; color: #c53030; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #4299e1;
      color: #fff;
      font-weight: 800;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .user-info { display: flex; align-items: center; gap: 10px; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .stat-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #718096; margin-bottom: 6px; }
    .stat-value { font-size: 1.8rem; font-weight: 800; color: #1a202c; }

    @media (max-width: 600px) {
      .stats-row { grid-template-columns: 1fr; }
      .users-table th:nth-child(3),
      .users-table td:nth-child(3),
      .users-table th:nth-child(4),
      .users-table td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="navbar-logo" href="../index.html">Shop<span>API</span></a>
    <div class="navbar-links">
      <a href="../index.html">Home</a>
      <a href="seller.html">Seller Hub</a>
      <a href="dashboard.html" class="active">Users</a>
    </div>
    <div id="nav-user-area"></div>
  </nav>

  <div class="page" style="max-width:1000px;">
    <div class="page-title">User Dashboard</div>
    <p class="page-sub">Manage all registered users</p>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Users</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Customers</div>
        <div class="stat-value" id="stat-customers">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Sellers</div>
        <div class="stat-value" id="stat-sellers">—</div>
      </div>
    </div>

    <div class="card" style="padding:0;overflow:hidden;">
      <div style="padding:18px 24px;border-bottom:1px solid #f0f4f8;display:flex;align-items:center;justify-content:space-between;">
        <div class="card-title" style="margin:0;">All Users</div>
        <input type="text" id="search-input" placeholder="Search by name or email…"
          oninput="filterUsers()" style="width:220px;margin:0;"/>
      </div>

      <div id="loader" class="loader" style="padding:20px 24px;">
        <span class="spinner"></span> Loading users…
      </div>

      <div id="error-msg" style="display:none;padding:20px 24px;color:#c53030;font-size:0.875rem;"></div>

      <div style="overflow-x:auto;">
        <table class="users-table" id="users-table" style="display:none;">
          <thead>
            <tr>
              <th>User</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Location</th>
              <th>Type</th>
              <th>Age</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>

      <div class="empty-state" id="empty-state" style="display:none;">
        <div>👤</div>
        No users found.
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toast-wrap"></div>

  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script>
    requireLogin();
    requireRole("admin");

    var allUsers = [];

    function getInitials(name) {
      if (!name) return '?';
      var parts = name.trim().split(' ');
      return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
    }

    function getBadgeClass(type) {
      if (type === 'seller') return 'badge-seller';
      if (type === 'admin') return 'badge-admin';
      return 'badge-customer';
    }

    function renderUsers(users) {
      var tbody = document.getElementById('users-tbody');
      if (!users.length) {
        document.getElementById('users-table').style.display = 'none';
        document.getElementById('empty-state').style.display = 'block';
        return;
      }
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('users-table').style.display = 'table';
      
      tbody.innerHTML = users.map(function(u) {
        return '<tr>' +
          '<td><div class="user-info"><div class="avatar">' + getInitials(u.fullName) + '</div><span>' + (u.fullName || '—') + '</span></div></td>' +
          '<td>' + (u.email || '—') + '</td>' +
          '<td>' + (u.phoneNumber || '—') + '</td>' +
          '<td>' + (u.location || '—') + '</td>' +
          '<td><span class="badge ' + getBadgeClass(u.type) + '">' + (u.type || 'customer') + '</span></td>' +
          '<td>' + (u.age || '—') + '</td>' +
          '<td><button class="btn btn-red btn-sm" onclick="deleteUser(\'' + u.id + '\')">Delete</button></td>' +
        '</tr>';
      }).join('');
    }

    function filterUsers() {
      var q = document.getElementById('search-input').value.toLowerCase();
      renderUsers(allUsers.filter(function(u) {
        return (u.fullName || '').toLowerCase().includes(q) ||
               (u.email || '').toLowerCase().includes(q);
      }));
    }

    function deleteUser(id) {
      if (!confirm('Delete this user?')) return;
       
      api.removeUser(id).then(function() {
        allUsers = allUsers.filter(function(u) { return u.id !== id; });
        renderUsers(allUsers);
        updateStats();
        showToast('User deleted.', 'success');
      }).catch(function() {
        showToast('Failed to delete user.', 'error');
      });
    }

    function updateStats() {
      document.getElementById('stat-total').textContent = allUsers.length;
      document.getElementById('stat-customers').textContent = allUsers.filter(function(u) { return u.type === 'customer' || !u.type; }).length;
      document.getElementById('stat-sellers').textContent = allUsers.filter(function(u) { return u.type === 'seller'; }).length;
    }

    function showToast(msg, type) {
      var wrap = document.getElementById('toast-wrap');
      var t = document.createElement('div');
      t.className = 'toast ' + (type || '');
      t.textContent = msg;
      wrap.appendChild(t);
      setTimeout(function() { t.remove(); }, 3000);
    }

    api.getAllusers().then(function(data) {
      document.getElementById('loader').style.display = 'none';
       
      allUsers = Array.isArray(data) ? data : (data.users || data.data || []);
       
      updateStats();
      renderUsers(allUsers);
    }).catch(function() {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('error-msg').textContent = 'Failed to load users. Please try again.';
      document.getElementById('error-msg').style.display = 'block';
    });
  </script>
</body>
</html>
