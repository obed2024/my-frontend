<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seller Hub —  e comerci</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .tab-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--gray-200);
    }
    .tab-btn {
      background: none;
      border: none;
      padding: 12px 20px;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--gray-500);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s ease;
    }
    .tab-btn:hover { color: var(--primary); }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .orders-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    .orders-table th {
      text-align: left;
      padding: 12px 16px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--gray-500);
      border-bottom: 2px solid var(--gray-200);
      background: var(--gray-50);
    }
    .orders-table td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--gray-100);
      color: var(--gray-700);
      vertical-align: middle;
    }
    .orders-table tr:last-child td { border-bottom: none; }
    .orders-table tr:hover td { background: var(--gray-50); }

    .badge-pending { background: #fefcbf; color: #744210; }
    .badge-confirmed { background: #c6f6d5; color: #22543d; }
    .badge-shipped { background: #bee3f8; color: #2a4365; }
    .badge-delivered { background: #e9d8fd; color: #553c9a; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .form-grid .form-group { margin-bottom: 0; }
    .form-grid .form-group.full { grid-column: 1 / -1; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="navbar-logo" href="../front-index.html">Clever <span>Store</span></a>
    <div class="navbar-links">
      <a href="../front-index.html">Home</a>
      <a href="seller.html" class="active">Seller Hub</a>
    </div>
    <div id="nav-user-area"></div>
  </nav>

  <div class="page" style="max-width:1000px;">
    <div class="page-title">Seller Hub</div>
    <p class="page-sub">Manage orders, create products, and set up your shop</p>

    <div class="tab-nav">
      <button class="tab-btn active" onclick="showTab('orders-tab', this)">📦 Orders</button>
      <button class="tab-btn" onclick="showTab('products-tab', this)">🛍️ Create Product</button>
      <button class="tab-btn" onclick="showTab('shops-tab', this)">🏪 Create Shop</button>
    </div>

    <div class="tab-panel active" id="orders-tab">
      <div class="card" style="padding:0;overflow:hidden;">
        <div style="padding:18px 24px;border-bottom:1px solid #f0f4f8;">
          <div class="card-title" style="margin:0;">All Orders</div>
        </div>
        <div id="orders-loader" class="loader" style="padding:20px 24px;">
          <span class="spinner"></span> Loading orders…
        </div>
        <div id="orders-error" style="display:none;padding:20px 24px;color:#c53030;font-size:0.875rem;"></div>
        <div style="overflow-x:auto;">
          <table class="orders-table" id="orders-table" style="display:none;">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Product ID</th>
                <th>Quality</th>
                <th>Price</th>
                <th>Status</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="orders-tbody"></tbody>
          </table>
        </div>
        <div class="empty-state" id="orders-empty" style="display:none;">
          <div>📦</div>
          No orders found.
        </div>
      </div>
    </div>

    <div class="tab-panel" id="products-tab">
      <div class="card">
        <div class="card-title">Create Product</div>
        <p style="color:var(--gray-600);font-size:0.85rem;margin-bottom:16px;">Add a new product to your catalog.</p>
        <div class="form-error" id="product-error" style="display:none;margin-bottom:14px;"></div>
        <div class="form-success" id="product-success" style="display:none;background:#f0fff4;border:1px solid #9ae6b4;color:#276749;border-radius:8px;padding:10px 14px;font-size:0.85rem;margin-bottom:14px;"></div>
        <div class="form-grid">
          <div class="form-group">
            <label>Name *</label>
            <input type="text" id="prod-name" placeholder="e.g. Running Shoes"/>
          </div>
          <div class="form-group">
            <label>Size *</label>
            <input type="text" id="prod-size" placeholder="e.g. 42, L, M"/>
          </div>
          <div class="form-group">
            <label>Price *</label>
            <input type="number" id="prod-price" placeholder="e.g. 49.99" min="0" step="0.01"/>
          </div>
          <div class="form-group">
            <label>Type *</label>
            <select id="prod-type">
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="unisex">Unisex</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Description</label>
            <input type="text" id="prod-desc" placeholder="Short product description"/>
          </div>
          <div class="form-group full">
            <label>Status *</label>
            <select id="prod-status">
              <option value="available">Available</option>
              <option value="unvailable">Unavailable</option>
            </select>
          </div>
          <div class="form-group full">
            <button class="btn btn-blue" id="btn-product" onclick="submitProduct()" style="width:100%;justify-content:center;">
              Create Product
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="shops-tab">
      <div class="card">
        <div class="card-title">Create Shop</div>
        <p style="color:var(--gray-600);font-size:0.85rem;margin-bottom:16px;">Register a new shop on the platform.</p>
        <div class="form-error" id="shop-error" style="display:none;margin-bottom:14px;"></div>
        <div class="form-success" id="shop-success" style="display:none;background:#f0fff4;border:1px solid #9ae6b4;color:#276749;border-radius:8px;padding:10px 14px;font-size:0.85rem;margin-bottom:14px;"></div>
        <div class="form-grid">
          <div class="form-group full">
            <label>Shop Name *</label>
            <input type="text" id="shop-name" placeholder="e.g. Kigali Fashion Store"/>
          </div>
          <div class="form-group full">
            <label>Description</label>
            <input type="text" id="shop-desc" placeholder="What does your shop sell?"/>
          </div>
          <div class="form-group">
            <label>Contact *</label>
            <input type="text" id="shop-contact" placeholder="e.g. +1234567890"/>
          </div>
          <div class="form-group">
            <label>Status *</label>
            <select id="shop-status">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
              <option value="pending">Pending</option>
            </select>
          </div>
          <div class="form-group full">
            <button class="btn btn-blue" id="btn-shop" onclick="submitShop()" style="width:100%;justify-content:center;">
              Create Shop
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toast-wrap"></div>

  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/helper.js"></script>
  <script>
    requireLogin();
    requireRole("admin", "seller");
    updateNavbar();

    function showTab(id, btn) {
      document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }

    function getBadgeClass(status) {
      if (status === 'confirmed') return 'badge-confirmed';
      if (status === 'shipped') return 'badge-shipped';
      if (status === 'delivered') return 'badge-delivered';
      return 'badge-pending';
    }

    api.getAllOrders().then(function(data) {
      document.getElementById('orders-loader').style.display = 'none';
      var orders = Array.isArray(data) ? data : (data.orders || data.data || []);
      var tbody = document.getElementById('orders-tbody');
      if (!orders.length) {
        document.getElementById('orders-table').style.display = 'none';
        document.getElementById('orders-empty').style.display = 'block';
        return;
      }
      document.getElementById('orders-empty').style.display = 'none';
      document.getElementById('orders-table').style.display = 'table';
      tbody.innerHTML = orders.map(function(o) {
        return '<tr>' +
          '<td>' + (o.id ? o.id.slice(0,8) + '…' : '—') + '</td>' +
          '<td>' + (o.prodId ? o.prodId.slice(0,8) + '…' : '—') + '</td>' +
          '<td>' + (o.quantity || '—') + '</td>' +
          '<td>$' + (o.price || '—') + '</td>' +
          '<td><span class="badge ' + getBadgeClass(o.status) + '">' + (o.status || 'pending') + '</span></td>' +
          '<td>' + (o.orderDate ? new Date(o.orderDate).toLocaleDateString() : '—') + '</td>' +
        '</tr>';
      }).join('');
    }).catch(function() {
      document.getElementById('orders-loader').style.display = 'none';
      document.getElementById('orders-error').textContent = 'Failed to load orders.';
      document.getElementById('orders-error').style.display = 'block';
    });

    function submitProduct() {
      var name = document.getElementById('prod-name').value.trim();
      var size = document.getElementById('prod-size').value.trim();
      var price = parseFloat(document.getElementById('prod-price').value);
      var type = document.getElementById('prod-type').value;
      var desc = document.getElementById('prod-desc').value.trim();
      var status = document.getElementById('prod-status').value;

      var errorEl = document.getElementById('product-error');
      var successEl = document.getElementById('product-success');
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      if (!name || !size || isNaN(price)) {
        errorEl.textContent = 'Name, size, and price are required.';
        errorEl.style.display = 'block';
        return;
      }

      var btn = document.getElementById('btn-product');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Creating…';

      api.createProduct({ name, size, price, type, description: desc, status }).then(function() {
        successEl.textContent = 'Product created successfully!';
        successEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Product';
        document.getElementById('prod-name').value = '';
        document.getElementById('prod-size').value = '';
        document.getElementById('prod-price').value = '';
        document.getElementById('prod-desc').value = '';
      }).catch(function(err) {
        errorEl.textContent = err.message || 'Failed to create product.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Product';
      });
    }

    function submitShop() {
      var name = document.getElementById('shop-name').value.trim();
      var desc = document.getElementById('shop-desc').value.trim();
      var contact = document.getElementById('shop-contact').value.trim();
      var status = document.getElementById('shop-status').value;

      var errorEl = document.getElementById('shop-error');
      var successEl = document.getElementById('shop-success');
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      if (!name || !contact) {
        errorEl.textContent = 'Shop name and contact are required.';
        errorEl.style.display = 'block';
        return;
      }

      var btn = document.getElementById('btn-shop');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Creating…';

      api.createShop({ name, description: desc, contact, status }).then(function() {
        successEl.textContent = 'Shop created successfully!';
        successEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Shop';
        document.getElementById('shop-name').value = '';
        document.getElementById('shop-desc').value = '';
        document.getElementById('shop-contact').value = '';
      }).catch(function(err) {
        errorEl.textContent = err.message || 'Failed to create shop.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Shop';
      });
    }
  </script>
</body>
</html>
