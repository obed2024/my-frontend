<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Products App</title>
  <link rel="stylesheet" href="../css/style.css"/>
  
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #f0f4f8;
    }

    .auth-box {
      background: #fff;
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
    }

    .auth-logo {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .auth-logo span { color: #48bb78; }

    .auth-subtitle {
      color: #718096;
      font-size: 0.875rem;
      margin-bottom: 28px;
    }

    .form-error {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      color: #c53030;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: none;
      line-height: 1.5;
    }

    .form-success {
      background: #f0fff4;
      border: 1px solid #9ae6b4;
      color: #276749;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: none;
    }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #718096;
    }

    .auth-footer a { color: #4299e1; font-weight: 700; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    .divider {
      text-align: center;
      color: #a0aec0;
      font-size: 0.75rem;
      margin: 16px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #e2e8f0;
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

  </style>
</head>
<body>

  <div class="auth-wrap">
    <div class="auth-box">

      <div class="auth-logo">Shop<span>API</span></div>
      <p class="auth-subtitle">Sign in to manage your products</p>

      <div class="form-success" id="login-success">
        ✓ Account created! You can now log in.
      </div>

      <div class="form-error" id="login-error"></div>

      <div class="form-group" style="margin-bottom:14px;">
        <label>Email</label>
        <input type="text" id="email" placeholder="e.g. jane@example.com"/>
      </div>

      <div class="form-group" style="margin-bottom:20px;">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password"
          onkeydown="if(event.key==='Enter') login()"/>
      </div>

      <button class="btn btn-green" id="btn-login" onclick="login()" style="width:100%;justify-content:center;">
        Log In
      </button>

      <div class="divider">or</div>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>

    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    requireGuest();
    if (window.location.search.includes('registered=1')) {
      var el = document.getElementById('login-success');
      if (el) el.style.display = 'block';
    }
  </script>
</body>
</html>
